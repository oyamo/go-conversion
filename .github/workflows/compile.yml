name: Compile

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-wasm:
    name: Compile WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up TinyGo
        uses: tinygo-org/setup-tinygo@v2
        with:
          tinygo-version: 'latest'

      - name: Create Target Directories
        run: mkdir -p frontend/src/assets/wasm

      - name: Compile WASM
        run: |
          cd go-wasm
          tinygo build -o ../frontend/src/assets/wasm/converter.wasm -target=wasm ./cmd/wasm
          cp $(tinygo env TINYGOROOT)/targets/wasm_exec.js ../frontend/src/assets/wasm/

      - name: Upload WASM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-binaries
          path: |
            frontend/src/assets/wasm/converter.wasm
            frontend/src/assets/wasm/wasm_exec.js
