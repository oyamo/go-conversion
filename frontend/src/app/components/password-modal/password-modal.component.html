<div class="modal-overlay" *ngIf="converterService.passwordPrompt() as prompt">
  <div class="modal-card">
    <div class="modal-header">
      <h3>Password Required</h3>
    </div>
    <div class="modal-body">
      <p>This ZIP archive is password-protected or encrypted. Please enter the password to extract it:</p>
      
      <div class="input-group">
        <input 
          type="password" 
          [(ngModel)]="password" 
          placeholder="Enter password..." 
          (keyup.enter)="submit()"
          autofocus
        />
      </div>
      
      <div class="error-message" *ngIf="prompt.error">
        Incorrect password. Please try again.
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="cancel()">Cancel</button>
      <button class="btn btn-primary" [disabled]="!password" (click)="submit()">Unlock</button>
    </div>
  </div>
</div>
