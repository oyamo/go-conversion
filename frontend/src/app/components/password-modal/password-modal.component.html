<div class="modal-overlay" *ngIf="converterService.passwordPrompt() as prompt">
  <div class="modal-card">
    <div class="modal-header">
      <h3>Password Required</h3>
    </div>
    <div class="modal-body">
      <p>This file is password-protected. Please enter the password to unlock it:</p>
      
      <div class="input-group">
        <input 
          #passwordInput
          type="password" 
          placeholder="Enter password..." 
          (keyup.enter)="passwordInput.value && submit(passwordInput.value)"
          autofocus
        />
      </div>
      
      <div class="error-message" *ngIf="prompt.error">
        Incorrect password. Please try again.
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="cancel()">Cancel</button>
      <button class="btn btn-primary" [disabled]="!passwordInput.value" (click)="submit(passwordInput.value)">Unlock</button>
    </div>
  </div>
</div>
